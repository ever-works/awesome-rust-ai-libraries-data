markdown: >-
  ## Overview


  `revonet` implements a real-coded genetic algorithm for solving optimization
  problems and training neural networks, also known as neuroevolution. It
  provides an evolutionary approach to neural network training that does not
  rely on gradient computation.


  ## Features


  - Real-coded genetic algorithm implementation

  - Neural network training through neuroevolution

  - Optimization problem solving

  - Gradient-free training approach

  - Alternative to backpropagation-based methods
