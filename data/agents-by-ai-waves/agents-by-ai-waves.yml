markdown: |-
  ## Overview

  Agents is an open-source framework for building autonomous language agents.

  ## Features

  - Long-short term memory
  - Tool usage integration
  - Web navigation capabilities
  - Multi-agent communication
  - Human-agent interaction
  - Symbolic control
  - Natural language config files
  - Multiple deployment interfaces

  ## Customization

  Fully customizable through natural language configuration files.
