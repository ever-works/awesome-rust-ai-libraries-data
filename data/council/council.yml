markdown: >-
  ## Overview


  Council is an open-source platform for the rapid development and robust
  deployment of customized generative AI applications. It provides tools and
  infrastructure for building, testing, and deploying AI-powered systems.


  ## Features


  - Rapid development environment for genAI applications

  - Robust deployment infrastructure

  - Custom agent configuration and orchestration

  - Evaluation and monitoring tools

  - Support for multiple LLM backends

  - Built-in testing and validation pipelines


  ## Pricing


  Free and open-source.
