markdown: >-
  ## Overview


  YiVal is an automatic prompt engineering assistant for building, evaluating,
  and optimizing generative AI applications. It provides a systematic way to
  refine prompts, model configurations, and retrieval strategies.


  ## Features


  - Automated prompt optimization

  - Model configuration tuning

  - Retrieval parameter optimization

  - Evaluation and benchmarking tools

  - Open-source prompt engineering workflow


  ## Pricing


  Free and open-source.
