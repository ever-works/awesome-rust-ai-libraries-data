markdown: >-
  ## Overview


  OpenAgents Network is an open-source platform for building interconnected AI
  agent networks with support for multiple communication protocols.


  ## Features


  - Multi-protocol support: WebSocket, gRPC, HTTP, MCP, A2A

  - Multi-agent orchestration with centralized and decentralized topologies

  - Compatible with Model Context Protocol (MCP) and Agent-to-Agent (A2A)
  protocol

  - Python SDK available on PyPI


  ## Technical Details


  - Language: Python

  - License: Apache-2.0

  - 1,799 GitHub stars


  ## Pricing


  Open-source under the Apache-2.0 license.
