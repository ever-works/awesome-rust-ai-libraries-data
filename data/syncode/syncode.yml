markdown: >-
  ## Overview


  Syncode enables syntactically constrained decoding for large language models,
  ensuring generated outputs conform to specific grammatical rules or structured
  formats like JSON, XML, or code syntax.


  ## Features


  - Syntactic constraint enforcement during generation

  - Support for multiple output formats

  - Integration with various LLM frameworks

  - Reduces post-processing requirements

  - General-purpose structured output generation


  ## Pricing


  Free and open-source.
