markdown: >-
  ## Overview


  Jaiqu uses AI to automate JSON schema transformations, enabling developers to
  convert between schemas with GPT-4 powered intelligence.


  ## Features


  - GPT-4 powered schema transformation

  - Schema validation

  - Fuzzy term matching

  - Repeatable jq query generation

  - Automated schema mapping


  ## Use Cases


  - Data format migration

  - API schema transformation

  - Data pipeline transformation
