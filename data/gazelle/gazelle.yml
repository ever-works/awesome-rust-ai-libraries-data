markdown: >-
  ## Overview


  Gazelle is a joint speech-language model designed to respond directly to audio
  input without intermediate text processing, enabling faster and more natural
  speech interactions.


  ## Features


  - Direct audio-to-audio processing

  - Joint speech-language architecture

  - Low-latency speech response

  - Bypasses text intermediate representation

  - Real-time dialogue capability


  ## Pricing


  Free and open-source.
