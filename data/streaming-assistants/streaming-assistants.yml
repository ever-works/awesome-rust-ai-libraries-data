name: Streaming Assistants
description: Library enabling streaming for OpenAI Assistants API using Astra
  Assistants, providing a workaround for the lack of streaming support in the
  official OpenAI Assistants API.
source_url: https://github.com/datastax/astra-assistants-api-py-client
category: LLM Tools
tags:
  - streaming
  - assistants-api
  - openai
markdown: >-
  ## Overview


  The streaming-assistants library enables streaming for OpenAI Assistants API
  using Astra Assistants.


  ## Features


  - Streaming support for OpenAI Assistants API

  - Astra Assistants integration

  - Workaround for missing official streaming

  - Real-time response delivery


  ## Pricing


  Free and open-source.
