markdown: >-
  ## Overview


  Sammo is a library for structure-aware multi-objective metaprompt
  optimization, designed to automatically optimize prompts across multiple goals
  and constraints.


  ## Features


  - Structure-aware prompt optimization

  - Multi-objective optimization

  - Metaprompt engineering capabilities

  - Automated prompt refinement

  - Evaluation-driven optimization


  ## Pricing


  Free and open-source.
