markdown: >-
  ## Overview


  tinygrad is a minimal deep learning framework built for simplicity. It
  provides a PyTorch-like API while maintaining a small, readable codebase.


  ## Features


  - PyTorch-like API

  - Minimal, readable implementation

  - Multiple backend support (CPU, GPU)

  - Supports common neural network operations

  - Educational and easy to understand


  ## Pricing


  Free and open-source under the MIT license.
