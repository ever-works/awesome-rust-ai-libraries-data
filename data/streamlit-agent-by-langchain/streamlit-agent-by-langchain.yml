markdown: |-
  ## Overview

  This repository showcases various LangChain agents as Streamlit apps.

  ## Features

  - Basic streaming app
  - Memory-based conversation app
  - MRKL functionality replication
  - Minimal agent with search capability
  - Chatbots with feedback options
  - Document querying
  - Database communication
  - Pandas DataFrame interaction
  - LangChain and Streamlit integrations

  ## Pricing

  Free and open-source.
