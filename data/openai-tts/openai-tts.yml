markdown: >-
  ## Overview


  The OpenAI Text-to-Speech (TTS) API allows users to convert text into
  high-quality, natural-sounding spoken audio.


  ## Features


  - High-quality, natural-sounding speech synthesis

  - Multiple language support

  - Various voice options

  - Customization capabilities

  - API-based access for integration


  ## Pricing


  Pay-per-use via OpenAI's API pricing model.
