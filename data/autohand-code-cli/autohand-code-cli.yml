markdown: |-
  ## Overview

  Autohand Code CLI is a self-evolving autonomous coding agent for the terminal.

  ## Features

  - ReAct pattern reasoning
  - 40+ development tools
  - Multi-LLM support (OpenRouter, Anthropic, OpenAI, Ollama, local models)
  - Semantic code search
  - Modular skill system
  - VS Code and Zed integration
  - Natural language codebase modification
