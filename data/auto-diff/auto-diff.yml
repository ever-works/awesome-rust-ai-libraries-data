markdown: >-
  ## Overview


  `auto-diff` is a neural network library written in Rust that focuses on
  automatic differentiation. It provides the core building blocks for
  constructing and training neural networks, leveraging Rust's performance and
  safety guarantees.


  ## Features


  - Automatic differentiation engine

  - Neural network layer implementations

  - Gradient-based training support

  - Rust-first design with performance optimizations
