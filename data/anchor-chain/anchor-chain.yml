markdown: >-
  ## Overview


  Anchor-Chain is a statically-typed, asynchronous framework designed
  specifically for defining LLM workflows in Rust. It enables developers to
  describe agents and tools declaratively using YAML or programmatically with
  code.


  ## Features


  - Statically-typed workflow definitions

  - Async-first architecture

  - Declarative YAML or programmatic agent definitions

  - Tool integration for agentic workflows


  ## Status


  Active development.
