markdown: >-
  ## Overview


  misanthropy is an experimental Rust binding for Anthropic's API, providing an
  alternative way to access Claude language models. It offers an easy-to-use
  interface for interacting with Anthropic's completion endpoints.


  ## Features


  - Simple binding for Anthropic's Claude API

  - Easy access to Claude models

  - Alternative experimental implementation


  ## Status


  Experimental.
