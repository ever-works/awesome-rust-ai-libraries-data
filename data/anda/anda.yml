name: Anda
description: Anda is an AI agent framework built with Rust for building
  autonomous multi-agent systems, available at https://github.com/ldclabs/anda.
  It leverages Rust's concurrency model for parallel agent execution and
  provides multi-agent orchestration, tool use, memory, planning, and workflow
  automation. Common use cases include automated task execution, research
  agents, and data analysis pipelines.
