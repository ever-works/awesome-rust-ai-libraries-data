markdown: >-
  ## Overview


  `prophet` is a neural network implementation written in Rust with a deliberate
  focus on cache-efficiency and sequential performance. It optimizes memory
  access patterns to take maximum advantage of CPU cache hierarchies.


  ## Features


  - Cache-efficient data structures and memory layout

  - Optimized for sequential performance

  - Pure Rust implementation

  - Focus on CPU-based neural network computation
