markdown: >-
  ## Overview


  Pinokio is a browser that enables the installation, running, and programmable
  control of any application with one click.


  ## Features


  - One-click application installation

  - Supports any open-source repository locally

  - LLM and AI agent project support

  - Programmable control of applications

  - Simplified deployment workflow


  ## Pricing


  Free and open-source.
