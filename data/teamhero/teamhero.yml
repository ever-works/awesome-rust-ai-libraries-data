markdown: >-
  ## Overview


  TeamHero is an open-source multi-agent orchestration platform designed for
  local-first AI agent team management.


  ## Features


  - Built-in web dashboard

  - Task lifecycle management

  - Knowledge base integration

  - Autopilot mode for autonomous operation

  - Role-based AI agent teams

  - Local execution with zero cloud dependency

  - Built on Claude Code


  ## Pricing


  Free and open-source.
