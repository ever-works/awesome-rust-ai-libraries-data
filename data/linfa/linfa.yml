name: linfa
description: "Linfa is a Rust machine learning framework inspired by
  scikit-learn, providing modular crates for classical ML algorithms like
  clustering, regression, SVMs, naive Bayes. Key features: trait-based
  interfaces, datasets, metrics, no-GPU focus. Use cases: traditional ML tasks,
  data science prototyping without deep learning; alternative to smartcore with
  more algorithms, complements deep learning frameworks like Burn."
