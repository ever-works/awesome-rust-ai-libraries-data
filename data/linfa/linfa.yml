name: linfa
description: Linfa is a comprehensive machine learning framework for Rust, often
  described as scikit-learn but in Rust. It provides classification, regression,
  clustering, dimensionality reduction, cross-validation, and a unified pipeline
  API, implementing algorithms such as PCA, SVM, decision trees, k-means, and
  logistic regression. Designed for traditional ML, data science, and
  statistical modeling workflows, it offers a modular, performant, and
  memory-safe alternative to Python ML ecosystems while leveraging Rust's type
  safety and zero-cost abstractions.
