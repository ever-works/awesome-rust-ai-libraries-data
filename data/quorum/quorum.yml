markdown: >-
  ## Overview


  Quorum is a multi-agent AI system designed for structured debates and
  collaborative discussion, supporting multiple discussion methods and model
  backends.


  ## Features


  - 7 discussion methods: Standard, Oxford, Socratic, Delphi, Brainstorm,
  Tradeoff, and Advocate

  - Multi-phase consensus: independent answers, critique, discussion, and
  synthesis

  - Supports Claude, GPT, Gemini, Grok, and local Ollama models

  - Terminal UI with real-time streaming

  - Auto-discovery of local Ollama models


  ## Technical Details


  - Language: Python

  - License: NOASSERTION

  - 84 GitHub stars


  ## Pricing


