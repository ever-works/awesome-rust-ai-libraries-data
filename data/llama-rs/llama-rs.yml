name: llama-rs
description: "Rustformers/llm provides a unified interface for running 100+ LLMs
  locally (Llama, Mistral, Phi) with backends like candle, llama.cpp via ggml.
  Key features: model loading from HF Hub, chat/completion APIs, quantization
  support. Use cases: local AI agents, chatbots without cloud; simpler
  alternative to candle for quick LLM inference."
source_url: https://github.com/rustformers/llm
