markdown: >-
  ## Overview


  HNSW-RS is a pure Rust implementation of the HNSW algorithm for approximate
  nearest neighbor search. It enables fast vector similarity search without
  requiring external C++ libraries.


  ## Features


  - Pure Rust HNSW implementation

  - Approximate nearest neighbor search

  - No C++ FFI dependencies

  - Suitable for vector embedding similarity search

  - Customizable index parameters


  ## Status


  Active development.
