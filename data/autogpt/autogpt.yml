markdown: |-
  ## Overview

  AutoGPT provides accessible AI tools for building and using AI agents.

  ## Components

  - **Forge**: Agent creation framework
  - **agbenchmark**: Performance evaluation
  - **Leaderboard**: Competition tracking
  - **User-friendly UI**: Visual interface
  - **CLI**: Command-line integration

  ## Features

  - Comprehensive agent framework
  - Performance benchmarking
  - Community competition
