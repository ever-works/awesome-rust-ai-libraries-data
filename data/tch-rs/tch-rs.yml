name: tch-rs
description: "Tch-rs provides Rust bindings for PyTorch (LibTorch), enabling
  tensor computations, neural network building, and training/inference with GPU
  support via CUDA. Key features: ergonomic API mirroring PyTorch, autograd,
  optimizers, torchvision integration. Use cases: leverage PyTorch ecosystem in
  Rust apps, hybrid Python-Rust ML pipelines; compares to Candle/Burn as
  PyTorch-dependent vs pure Rust, but offers mature models/ecosystem."
