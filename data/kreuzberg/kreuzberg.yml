markdown: >-
  ## Overview


  Kreuzberg is a Rust-based document intelligence library designed to extract
  structured content from a wide variety of file formats. It is particularly
  useful in RAG (Retrieval-Augmented Generation) pipelines and document
  processing workflows.


  ## Supported Formats


  - PDF documents (with OCR support)

  - Microsoft Office formats (Word, Excel, PowerPoint)

  - HTML documents

  - Email messages

  - Archive files

  - Images with optical character recognition (OCR)

  - Support for 62+ formats total


  ## Extracted Data


  - Plain text content

  - Table structures

  - Document metadata


  ## Use Cases


  - Preparing documents for RAG-based LLM applications

  - Content extraction for search indexing

  - Document analysis and processing pipelines
