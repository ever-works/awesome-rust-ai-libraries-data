name: rust-autograd
description: "Rust-autograd implements reverse-mode automatic differentiation
  for ML research, supporting tensors, gradients, custom ops. Key features:
  tape-based AD, GPU via CUDA, optimizer integration. Use cases: building custom
  NNs from scratch, prototyping; lighter than dfdx, focused purely on AD."
