markdown: >-
  ## Overview


  Tabby is a self-hosted AI coding assistant, an open-source alternative to
  GitHub Copilot with GPU support and OpenAPI interface.


  ## Features


  - Self-hosted deployment for privacy

  - GPU acceleration for faster inference

  - OpenAPI interface for easy integration


  ## Pricing


  Open-source and free.
