markdown: >-
  ## Overview


  m2cgen generates pure Rust code from trained ML models for model inference
  without external dependencies.


  ## Features


  - Transpilation to Rust

  - Zero runtime dependencies

  - Support for classic ML models from various frameworks


  ## Pricing


  Free and open-source.
