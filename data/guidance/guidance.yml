markdown: >-
  ## Overview


  Guidance is a programming paradigm for language model generation that provides
  fine-grained control over output through constraints and stateful execution.


  ## Features


  - Regex-based output constraints

  - Context-free grammar (CFG) constraints

  - Stateful generation control

  - Simplified interface for complex generation

  - Enhanced control over model outputs

  - Efficient generation workflows
