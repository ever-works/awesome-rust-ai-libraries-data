name: Lumen
description: A vision-first browser agent with self-healing deterministic replay
  over CDP, using a screenshot-model-action loop with multi-provider support for
  Anthropic and Google models.
source_url: https://github.com/LumenLabs/lumen
category: Agentic Systems
tags:
