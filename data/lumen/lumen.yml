markdown: >-
  ## Overview


  Lumen is a vision-first browser agent that operates through a
  screenshot-to-model-to-action loop with deterministic replay capabilities.


  ## Features


  - Vision-first browser interaction

  - Self-healing deterministic replay over CDP (Chrome DevTools Protocol)

  - Screenshot -> model -> action loop

  - Multi-provider LLM support (Anthropic, Google)

  - Deterministic automation with self-healing
