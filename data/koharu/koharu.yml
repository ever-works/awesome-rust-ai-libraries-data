markdown: >-
  ## Overview


  Koharu is an ML-powered manga translator featuring automatic speech bubble
  detection, OCR, inpainting, and LLM translation, built with Candle and Tauri.


  ## Features


  - Automatic speech bubble detection

  - OCR for text extraction

  - Inpainting for clean translations

  - LLM-based translation


  ## Pricing


  Open-source and free.
