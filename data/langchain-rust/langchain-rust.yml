featured: false
markdown: >-
  ## Overview


  LangChain-rust is a Rust port of the popular LangChain Python library. It
  implements core LangChain concepts such as composable prompts, chains, agents,
  and memory management.


  ## Features


  - Composable prompt templates and chain building

  - Agent definitions with tool integration

  - Memory management for conversation context

  - Inspired by LangChain.py architecture


  ## Status


  Active development.
