name: LangChain-rust
description: LangChain-rust is a Rust implementation of the LangChain framework
  for building LLM-powered applications, featuring chain composition, tool
  integration, memory management, prompt templating, and support for multiple
  LLM providers including OpenAI and Anthropic. It enables developers to build
  AI agents, construct RAG pipelines, and create conversational AI systems with
  Rust's performance and safety guarantees. The project is available at
  https://github.com/Abraxas-365/langchain-rust.
source_url: https://github.com/Abraxas-365/langchain-rust
category: RAG Tools
