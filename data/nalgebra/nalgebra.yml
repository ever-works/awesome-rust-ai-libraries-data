name: nalgebra
description: "Nalgebra offers generic linear algebra with
  matrices/vectors/quaternions, geometry primitives, optimized for
  games/physics/ML. Key features: SIMD, sparse matrices, decompositions (SVD,
  QR). Use cases: 3D graphics, robotics kinematics, tensor bases; performant
  alternative to faer for general-purpose LA."
