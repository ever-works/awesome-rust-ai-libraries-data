  ## Overview


  Sweep is an AI tool that automates the transformation of GitHub issues into
  pull requests, streamlining code improvements and bug fixes.


  ## Features


  - Codebase understanding

  - Automated pull request generation from issues

  - Test running capabilities

  - Developer-friendly interface

  - Bug fix automation

  - Easy installation


  ## Pricing


  Free and open-source with paid tiers available.
