markdown: >-
  ## Overview


  A lightweight context engine for AI agents designed for event ingestion and
  natural language querying.


  ## Features


  - Event ingestion from any source

  - Natural language query support

  - Ranked results with temporal decay

  - Auto-deduplication

  - Zero configuration with SQLite

  - Local TF-IDF embeddings

  - Scales to pgvector and OpenAI
