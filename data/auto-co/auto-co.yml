markdown: >-
  ## Overview


  auto-co is an autonomous AI company operating system that deploys 14
  specialized expert-persona agents to run a startup end-to-end, from strategy
  to deployment.


  ## Features


  - 14 expert-persona agents: CEO (Bezos), CTO (Vogels), Critic (Munger), CFO,
  marketer, engineer, QA, DevOps, and more

  - Continuous bash loop where agents debate, decide, and ship real deployments
  autonomously

  - Shared markdown consensus file as the cross-cycle relay baton

  - Human escalation via Telegram for true blockers only

  - Repo is a live company: built its own landing page, Docker stack, and
  monitoring across 13 autonomous cycles


  ## Technical Details


  - Language: TypeScript

  - License: MIT

  - 23 GitHub stars


  ## Pricing


  Open-source under the MIT license.
