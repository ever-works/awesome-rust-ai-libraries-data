markdown: >-
  ## Overview


  Kyanite is a neural network inference library written in Rust. It provides
  ONNX model support and includes a custom Graph IR for representing and
  optimizing computation graphs during inference.


  ## Features


  - Neural network inference execution

  - ONNX model loading and execution

  - Custom Graph IR for computation graph representation

  - CPU and CUDA backend support


  ## Backend Support


  - CPU: Host-side inference computation

  - CUDA: NVIDIA GPU acceleration via manual CUDA bindings


  ## Dependencies


  - Manual bindings to CUDA


  ## Pricing


  Free and open-source.
