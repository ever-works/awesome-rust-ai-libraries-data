markdown: >-
  ## Overview


  LlamaGym simplifies the process of fine-tuning LLM agents through online
  reinforcement learning using Gym-style environments.


  ## Features


  - Online reinforcement learning for LLM agents

  - Gym environment integration

  - Efficient agent prompting

  - Hyperparameter tuning tools

  - Iterative experimentation framework

  - Agent behavior optimization
