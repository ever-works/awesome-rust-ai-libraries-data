featured: false
markdown: >-
  ## Overview


  LanceDB is an open-source vector database optimized for AI applications,
  offering serverless operation and low-latency queries.


  ## Features


  - Serverless and low-latency vector storage

  - Designed specifically for AI use cases


  ## Pricing


  Free and open-source.
