name: LanceDB
description: "LanceDB is a serverless vector database for AI applications, built
  in Rust on the Lance columnar format for scalable performance from laptop to
  cloud. It offers fast vector similarity search, hybrid search, multi-modal
  data support, and an embedded/serverless architecture that requires no
  infrastructure management. The database is ideal for RAG applications,
  recommendation systems, and AI-powered search. Source:
  https://github.com/lancedb/lancedb"
source_url: https://github.com/lancedb/lancedb
category: Vector Databases
