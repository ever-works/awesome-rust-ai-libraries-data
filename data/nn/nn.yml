markdown: >-
  ## Overview


  `nn` is a multilayer feedforward backpropagation neural network library for
  Rust. It implements classic feedforward neural network architectures with
  backpropagation for training.


  ## Features


  - Multilayer feedforward neural networks

  - Backpropagation-based training algorithm

  - Simple and straightforward API

  - Pure Rust implementation
