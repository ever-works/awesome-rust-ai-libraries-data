featured: false
markdown: >-
  ## Overview


  Plotters is a fast and easy-to-use plotting library for Rust with support for
  various backends.


  ## Features


  - Line, scatter, histogram, box plots

  - Bitmap (PNG) and vector (SVG, PDF) output

  - Multi-threaded rendering

  - Customizable themes and styles


  ## Use Cases


  - Data analysis visualization

  - ML experiment tracking

  - Scientific plotting


  Free and open-source.
