markdown: >-
  ## Overview


  The astra-assistants-api provides a backend implementation of the OpenAI
  Assistants API.


  ## Features


  - Persistent threads

  - File management

  - Assistant management

  - Streaming support

  - Function calling

  - AstraDB powered by Apache Cassandra and JVector

  - Compatible with existing OpenAI apps by changing a single line of code
