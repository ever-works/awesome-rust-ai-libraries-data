markdown: >-
  ## Overview


  MCPHost serves as a CLI host that bridges LLMs with external tools via the
  Model Context Protocol, enabling agents to access tools and resources.


  ## Features


  - CLI-based MCP host

  - Enables LLM tool interaction

  - Supports Model Context Protocol

  - Lightweight terminal interface

  - Compatible with MCP server ecosystem


  ## Pricing


  Free and open-source.
