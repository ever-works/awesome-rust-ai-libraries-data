name: tokenizers
description: "Hugging Face Tokenizers Rust implementation for fast, efficient
  tokenization using BPE, WordPiece, Unigram for LLMs/BERT. Key features:
  pre-trained vocab loading, parallel processing, Rust/Python interop. Use
  cases: preprocessing for NLP models in Rust pipelines, custom tokenizer
  training; essential companion to rust-bert, candle."
