name: Kwaak
description: Kwaak is an AI-powered software development agent written in Rust
  that provides code analysis, automated refactoring, repository understanding,
  and multi-file editing capabilities. It supports use cases such as automated
  code review, development assistance, and documentation generation. The project
  is available at https://github.com/bosun-ai/kwaak and orchestrates AI coding
  workflows to accelerate software development tasks.
