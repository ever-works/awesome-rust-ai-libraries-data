  ## Overview


  beta9 is a serverless GPU platform providing ultrafast inference, sandboxed
  execution environments, and support for background ML jobs.


  ## Features


  - Serverless GPU inference

  - Isolated sandbox environments

  - Background job processing

  - Auto-scaling GPU resources

  - Simple deployment interface


  ## Pricing


  Free and open-source.
