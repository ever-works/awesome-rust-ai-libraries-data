name: arrayfire-rust
description: "Arrayfire Rust bindings provide GPU-accelerated computing with
  multi-dimensional arrays, supporting CPU/OpenCL/CUDA backends for array ops,
  linear algebra, stats. Key features: JIT compilation, high-level array syntax,
  FFT/image processing. Use cases: high-perf numerical workloads, ML kernels;
  alternative to ndarray with GPU focus, precursor to modern Rust DL
  frameworks."
