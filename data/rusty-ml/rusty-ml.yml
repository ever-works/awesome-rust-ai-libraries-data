markdown: >-
  ## Overview


  Rusty-ml is a comprehensive machine learning library that provides numerous
  classic algorithms that range from clustering, regression to classification,
  etc. Some of these algorithms include Random Forests, Gradient Boosted
  Regression Trees, supervised, and unsupervised learning.


  Rusty-ml is also designed to be simple to learn, fast, and easy-to-use. Even
  with the plethora of algorithms, this library still manages to maintain its
  size and scope without compromising its simplicity.


  ## Features


  - Algorithms: Random Forests, Gradient Boosted Regression Trees, clustering,
  regression, classification

  - Support for supervised and unsupervised learning

  - Metrics: Mean Square Error, Hamming Loss, and others

  - No external dependencies, lightweight
