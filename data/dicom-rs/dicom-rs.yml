markdown: >-
  ## Overview


  A pure Rust implementation of the DICOM standard, allowing users to work with
  DICOM objects and interact with DICOM applications.


  ## Features


  - Fast, safe, and intuitive to use

  - Read and write DICOM files

  - Object model for DICOM data elements

  - Support for DICOM networking (in development)
