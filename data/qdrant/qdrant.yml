name: Qdrant
description: Qdrant is a high-performance vector similarity search engine and
  database written in Rust, designed for fast approximate nearest neighbor
  search with built-in filtering, payload storage, and distributed clustering
  capabilities. It supports gRPC and REST APIs, leverages HNSW indexing, and
  offers GPU acceleration for demanding workloads. Common use cases include
  semantic search, recommendation engines, and broader AI applications that
  require efficient vector retrieval at scale.
source_url: https://github.com/qdrant/qdrant
category: Vector Search
