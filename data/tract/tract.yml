name: tract
description: "Tract is an ONNX inference library in pure Rust, supporting a wide
  range of operators for model execution on CPU with optimizations like fusion
  and quantization. Key features: no unsafe code, WASM support, CLI tools for
  model inspection/conversion. Use cases: edge inference, ONNX model serving
  without Python deps, lightweight deployment; alternative to ONNX Runtime with
  Rust safety and Candle for ONNX-specific focus."
