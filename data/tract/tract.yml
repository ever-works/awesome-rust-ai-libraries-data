name: tract
description: A tiny, no-nonsense, self-contained inference engine for TensorFlow
  and ONNX models written in Rust. It has zero external dependencies and
  compiles models into optimized computation graphs for fast inference, making
  it significantly smaller and more portable than ONNX Runtime. Ideal for edge
  deployment, server-side model serving, and embedded machine learning workloads
  where size and simplicity matter.
