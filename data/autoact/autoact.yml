markdown: >-
  ## Overview


  AutoAct is an automatic agent learning framework that synthesizes planning
  trajectories.


  ## Features


  - Planning trajectory synthesis

  - No large-scale data requirement

  - No closed-source model dependency

  - Division-of-labor strategy

  - Superior or comparable performance in experiments
