name: Candle
description: Candle is Hugging Face's minimalist ML framework for Rust, designed
  with zero dependencies and GPU acceleration via CUDA and Metal to make easy
  deployment a priority. It supports GGUF and Safetensors formats, enabling
  inference for transformer models that power LLMs, computer vision, and speech
  recognition workloads. Significantly lighter than PyTorch, Candle is
  purpose-built for edge deployment scenarios where a small footprint and
  performance matter most.
