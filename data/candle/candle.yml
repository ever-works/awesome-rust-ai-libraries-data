name: Candle
description: "Candle is a pure Rust machine learning framework designed for
  performance and portability, enabling seamless training and inference of
  neural networks including transformers and diffusion models. Key features
  include tensor operations with multiple backends (CPU, CUDA, Metal, Vulkan),
  autograd for differentiation, serialization support for safetensors and ggml,
  and no external dependencies unlike PyTorch bindings. Use cases: efficient
  local LLM inference, model fine-tuning, on-device AI; compares favorably to
  tch-rs for pure-Rust simplicity and Burn for backend flexibility."
