  ## Overview

  Perceptual image hashing and comparison for equality and similarity.

  ## Features

  - Structural similarity hashing (DHash, AHash, PHash)
  - Comparison metrics (Hamming distance, normalized Hamming)
  - Supports various image formats via the `image` crate
