markdown: >-
  ## Overview


  AgentDock provides an open-source foundation to build, manage, and deploy
  production-ready AI agents and workflows, eliminating the need for complex API
  integrations.


  ## Features


  - Unified agent management platform

  - Streamlined API integration layer

  - Production-ready deployment capabilities

  - Workflow orchestration tools

  - Open-source architecture

  - Reduces complexity of managing multiple AI service providers


  ## Pricing


  Free and open-source.
