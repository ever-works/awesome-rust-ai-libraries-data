markdown: >-
  ## Overview


  FastMCP provides a Python-native approach to building Model Context Protocol
  servers, enabling seamless integration between LLMs and external tools.


  ## Features


  - Pythonic API for building MCP servers

  - Seamless tool registration and discovery

  - Compatible with the broader MCP ecosystem

  - Fast setup and minimal boilerplate

  - Supports streaming responses


  ## Pricing


  Free and open-source.
