markdown: >-
  ## Overview


  `mininn` is a minimalist deep learning library for Rust that provides
  essential components for building and training neural networks. It aims to be
  lightweight and approachable while still offering the core features needed for
  deep learning tasks.


  ## Features


  - Lightweight and minimalist design

  - Neural network construction and training

  - Easy-to-use API for rapid prototyping

  - Suitable for learning and small-scale projects
