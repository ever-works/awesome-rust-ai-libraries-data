markdown: >-
  ## Overview


  LangGraph.js is the JavaScript/TypeScript implementation of LangGraph,
  enabling complex stateful LLM applications through cyclic graph-based
  workflows.


  ## Features


  - TypeScript and JavaScript support

  - Stateful multi-actor applications

  - Cyclic coordination (not limited to DAGs)

  - Conditional edges and cycles

  - Complex agent-like behavior construction

  - Streaming support

  - Extensive documentation and examples


  ## Architecture


  - Graph-based computation model

  - State management

  - Multi-actor orchestration

  - Conditional branching
