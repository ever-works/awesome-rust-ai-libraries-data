name: Self Operating Computer
description: Framework enabling multimodal models to autonomously interact with
  a computer using human-like inputs and outputs, including keyboard and mouse
  control. Compatible with GPT-4v, Gemini Pro Vision, and LLaVA.
source_url: https://github.com/OthersideAI/self-operating-computer
category: AI Agents
tags:
