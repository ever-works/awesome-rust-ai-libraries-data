markdown: >-
  ## Overview


  Self Operating Computer (SOC) enables multimodal models to autonomously
  interact with a computer using human-like inputs and outputs.


  ## Features


  - Multimodal model compatibility

  - GPT-4v, Gemini Pro Vision, and LLaVA support

  - Keyboard and mouse control

  - Voice mode support

  - Optical character recognition (OCR)

  - Future support for additional models


  ## Pricing


  Free and open-source.
