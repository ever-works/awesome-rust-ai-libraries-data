markdown: >-
  ## Overview


  agent-opt is an optimization engine designed for iterative prompt refinement
  and agent workflow performance tuning using multiple optimization algorithms.


  ## Features


  - Six optimization algorithms: Random, Bayesian, ProTeGi, Meta-Prompt,
  PromptWizard, GEPA

  - Flexible evaluation via heuristic metrics and LLM-as-a-judge

  - Works with any LLM provider through LiteLLM

  - Clean abstraction layer for custom optimizers and evaluators

  - Built-in logging, progress tracking, and reproducible experimentation


  ## Technical Details


  - Language: Python

  - License: NOASSERTION

  - 51 GitHub stars


