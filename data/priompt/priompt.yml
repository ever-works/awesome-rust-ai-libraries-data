markdown: >-
  ## Overview


  Priompt is a JSX-based library for designing prompts with priorities, aiming
  to optimize inclusion of content within token limits.


  ## Features


  - JSX-based prompt design

  - Priority-based content inclusion

  - Token limit optimization

  - React-inspired architecture

  - Installation support and examples

  - Principles and future considerations documented


  ## Pricing


  Free and open-source.
