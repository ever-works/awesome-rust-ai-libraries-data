markdown: >-
  ## Overview


  PGVectorScale is a suite of tooling developed by TimescaleDB to enhance and
  scale vector search capabilities in PostgreSQL. It extends PGVector with
  sharding and performance optimizations specifically designed for AI workloads.


  ## Features


  - Scales PostgreSQL + PGVector for AI applications

  - Sharding support for distributed vector search

  - Performance optimizations for large vector datasets

  - TimescaleDB integration and expertise


  ## Status


  Experimental.
