markdown: >-
  ## Overview


  MergeKit by Arcee AI provides tools for merging pre-trained large language
  models to create more capable AI systems.


  ## Features


  - Pre-trained LLM merging

  - Knowledge combination from multiple models

  - Enhanced model versatility

  - Similar capabilities to RAG through model fusion

  - Open-source implementation
