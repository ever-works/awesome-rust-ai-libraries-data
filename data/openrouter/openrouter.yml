markdown: >-
  ## Overview


  OpenRouter is a platform providing unified access to a wide range of large
  language models from multiple providers.


  ## Features


  - Access to open-source and proprietary models

  - Support for ChatGPT, Gemini, Perplexity, and more

  - Model comparison and pricing discovery

  - Unified API interface

  - Pay-per-use billing


  ## Pricing


  Pay-per-use based on selected model pricing.
