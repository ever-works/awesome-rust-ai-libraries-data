markdown: >-
  ## Overview


  AppAgent is a mobile-friendly LLM-based multimodal agent framework developed
  to operate smartphone apps.


  ## Features


  - Human-like app interactions

  - Wide application support

  - No back-end access required

  - Multimodal processing

  - LLM-based operation


  ## Use Cases


  Automating smartphone app operations without requiring system-level access.
