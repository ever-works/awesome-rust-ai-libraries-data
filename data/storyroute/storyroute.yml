markdown: >-
  ## Overview


  StoryRoute is an LLM-powered autonomous agent that monitors GPS coordinates
  and generates real-time audio stories as users walk through any city.


  ## Features


  - GPS coordinate monitoring

  - Real-time audio story generation

  - Fully autonomous sense-reason-act pipeline

  - Context-aware LLM prompting

  - Text-to-speech synthesis

  - City walking exploration


