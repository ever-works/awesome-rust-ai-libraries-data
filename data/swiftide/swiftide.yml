name: Swiftide
description: Swiftide is a fast, streaming indexing, query, and agentic LLM
  processing pipeline built in Rust. It features streaming data processing,
  vector embedding pipelines, RAG support, agent orchestration, and an async
  architecture powered by Rust's async ecosystem for efficient concurrent
  processing. Common use cases include building RAG systems, knowledge base
  indexing, and AI data pipelines. The project is available at
  https://github.com/bosun-ai/swiftide.
