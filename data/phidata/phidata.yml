markdown: >-
  ## Overview


  Phidata is a framework for building multi-modal AI Agents with comprehensive
  capabilities including memory, knowledge, tools, and reasoning.


  ## Features


  - Multi-modal agent support

  - Persistent memory systems

  - Knowledge base integration

  - Tool execution capabilities

  - Agent reasoning capabilities

  - Beautiful Agent UI for chat interface

  - Conversational AI integration


  ## Pricing


  Free and open-source.
