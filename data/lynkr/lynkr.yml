markdown: >-
  ## Overview


  Lynkr acts as a proxy layer enabling Claude Code CLI to work with
  non-Anthropic LLM backends while providing local tool management and MCP
  server composition.


  ## Features


  - Claude Code CLI proxy for non-Anthropic LLMs

  - Local tool management

  - MCP server composition

  - Prompt caching

  - Repository intelligence

  - Git-aware automation

  - Anthropic backend compatible
