markdown: >-
  ## Overview


  This crate provides a Rust client for the HuggingFace Inference Endpoint API.
  It allows Rust applications to call models hosted on Hugging Face's
  infrastructure for completions and other ML tasks.


  ## Features


  - Call hosted HuggingFace models via inference endpoints

  - Text completion and generation support

  - Integration with HuggingFace's managed infrastructure


  ## Status


  Active development.
