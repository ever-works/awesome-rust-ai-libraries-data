name: SentencePiece (Rust)
description: Rust bindings to Google's SentencePiece tokenizer, supporting
  unigram language model segmentation. Enables subword tokenization in Rust
  applications using the widely adopted SentencePiece algorithm.
source_url: https://crates.io/crates/sentencepiece
