name: Elia
description: Keyboard-centric terminal user interface for interacting with LLMs
  like ChatGPT, Claude, Llama 3, Phi 3, Mistral, and Gemma, offering efficient
  terminal-based interaction, multi-model switching, local model support, and
  local SQLite storage.
source_url: https://github.com/darrenburns/elia
category: LLM Tools
tags:
