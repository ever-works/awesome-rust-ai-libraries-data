markdown: >-
  ## Overview


  Botpress is an open-source platform for building, deploying, and managing
  conversational AI agents. It provides a visual flow builder and supports
  integration with various LLMs including GPT models.


  ## Features


  - Visual drag-and-drop conversation flow builder

  - Support for multiple LLM backends (GPT, Claude, etc.)

  - Built-in NLU and intent recognition

  - Multi-channel deployment (web, Slack, Teams, Telegram)

  - Self-hosted or cloud deployment options

  - Knowledge base integration for RAG-based responses

  - Analytics and conversation monitoring


  ## Pricing


  Free and open-source under the AGPL-3.0 license for self-hosted use.
  Cloud-hosted plans are also available.
