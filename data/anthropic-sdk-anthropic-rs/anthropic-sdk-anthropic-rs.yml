markdown: >-
  ## Overview


  anthropic-rs is a Rust client for Anthropic's Claude API, enabling Rust
  applications to interact with the Claude family of language models. It
  supports streaming completions for real-time response generation.


  ## Features


  - Access to Anthropic Claude API from Rust

  - Streaming completions for real-time token output

  - Supports Claude model family


  ## Status


  Active work in progress.
