name: smartcore
description: Comprehensive machine learning library in Rust with algorithms for
  classification, regression, clustering, NLP, and optimization. Features wide
  algorithm coverage including random forests, gradient boosting, SVM, KNN, PCA,
  and linear algebra. Suitable for data science, statistical modeling, and
  predictive analytics use cases. Pure Rust implementation with ndarray support,
  designed to handle large datasets efficiently.
