name: smartcore
description: "SmartCore is a comprehensive ML library in pure Rust with 50+
  algorithms for supervised/unsupervised learning, including SVM, random
  forests, KNN, PCA, neural nets. Key features: no dependencies, serialization,
  datasets. Use cases: embedded ML, cross-platform apps; similar to linfa but
  more algorithms, no external deps."
