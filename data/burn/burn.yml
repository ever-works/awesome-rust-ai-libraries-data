name: Burn
description: "Burn is a next-generation deep learning framework in Rust,
  emphasizing flexibility, speed, and ease of use with interchangeable backends
  (Tch, NdArray, Wgpu). It supports custom NN modules, optimizers, datasets, and
  training loops for both training and inference. Key features: backend
  abstraction, kernel fusion for performance, ONNX import/export. Use cases:
  rapid prototyping, production deployment, GPU/CPU/WASM inference; alternative
  to Candle with stronger abstraction layers and Candle with more backends."
