name: Burn
description: Burn is a next-generation tensor library and ML framework written
  in Rust, offering comprehensive capabilities similar to PyTorch but with
  Rust's safety guarantees. It supports automatic differentiation, multiple
  backends (WGPU, CUDA, tch), both dynamic and static graphs, and runs across
  multiple devices. Designed with a flexible training pipeline and ONNX model
  export, Burn is well-suited for deep learning research, production ML, and
  training neural networks.
