  ## Overview

  CLIN by Allen Institute for AI is an interactive continual learning agent.

  ## Features

  - Rapid task adaptation
  - Interactive learning
  - ScienceWorld environment support
  - GPT-3.5-turbo and GPT-4 compatibility

  ## Setup

  Requires Java, Python, and ScienceWorld environment.
