markdown: >-
  ## Overview


  DeltaML is an open-source machine learning framework built entirely in Rust,
  denoted by the delta symbol (Δ). It provides a comprehensive ecosystem for
  developing machine learning applications with Rust's performance and safety
  characteristics.


  ## Features


  - Comprehensive ML framework with training and inference capabilities

  - Open-source under a permissive license

  - Built with Rust's memory safety and performance guarantees

  - Designed for developer productivity
