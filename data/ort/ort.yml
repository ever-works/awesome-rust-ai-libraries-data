name: Ort
description: "Ort (ONNX Runtime Rust bindings) enables high-performance
  inference of ONNX models with CPU, CUDA, TensorRT, DirectML backends in Rust.
  Key features: session management, tensor I/O, dynamic shapes, operator
  support. Use cases: deploying trained models from PyTorch/TensorFlow,
  cross-platform inference; compares to tract for pure-Rust ONNX but adds more
  execution providers like GPU."
