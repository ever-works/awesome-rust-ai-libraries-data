name: Ort
description: Ort is a fast ML inference and training library for ONNX models
  written in Rust, powered by ONNX Runtime. It provides high-performance ONNX
  Runtime bindings with GPU acceleration and dynamic batching capabilities.
  Developers use it for deploying pre-trained models, running production
  inference, and building cross-platform AI applications. The library supersedes
  older Rust ONNX Runtime bindings with a more complete and modern API.
