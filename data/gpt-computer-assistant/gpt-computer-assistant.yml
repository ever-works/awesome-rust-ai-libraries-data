markdown: >-
  ## Overview


  GPT Computer Assistant is an open-source desktop application that extends
  ChatGPT capabilities to full computer interaction on Windows and Linux
  platforms.


  ## Features


  - Screen reading and visual understanding

  - Microphone input for voice interaction

  - System audio interaction

  - Clipboard management

  - Script execution capabilities

  - Works on both Windows and Linux

  - Unofficial implementation providing extended functionality beyond web-based
  interfaces
