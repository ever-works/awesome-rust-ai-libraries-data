name: faer
description: "Faer is a fast, ergonomic linear algebra library focusing on
  dense/sparse solvers, factorizations for numerical stability in ML/scientific
  computing. Key features: BLAS-free, no_std options, parallel solvers. Use
  cases: large-scale simulations, preconditioners for optimizers; competes with
  nalgebra on speed for dense ops."
