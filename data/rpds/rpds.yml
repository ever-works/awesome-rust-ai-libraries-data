featured: false
markdown: |-
  ## Overview

  rpds implements persistent/functional data structures in Rust.

  ## Features

  - Persistent List, Vector, Map, Set
  - Efficient updates with copy-on-write
  - Thread-safe sharing
  - Rich API for functional operations

  ## Use Cases

  - Concurrent data processing
  - State management in agents
  - Immutable data flows

  Free and open-source.
