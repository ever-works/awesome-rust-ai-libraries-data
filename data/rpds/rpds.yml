name: rpds
description: Persistent data structures library providing immutable, thread-safe
  collections like lists, vectors, maps, and sets. Supports functional
  programming patterns useful in concurrent AI systems and simulations.
source_url: https://github.com/orium/rpds
category: Machine Learning
