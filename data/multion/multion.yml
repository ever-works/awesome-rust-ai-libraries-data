markdown: >-
  ## Overview


  MultiOn provides AI-powered browser automation that performs web tasks
  autonomously, mimicking human interaction without manual input.


  ## Features


  - Automated form filling

  - Data retrieval from websites

  - Web search execution

  - Human-like browser interaction

  - Chrome extension

  - Developer API for integration
