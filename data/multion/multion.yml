name: MultiOn
description: An AI platform that automates actions within web browsers such as
  form filling, data retrieval, and executing web searches by mimicking human
  interaction, available through a Chrome extension and developer API.
source_url: https://www.multion.ai
category: Agentic Systems
tags:
  - browser-automation
