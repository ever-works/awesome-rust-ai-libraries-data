markdown: >-
  ## Overview


  Tarsier is an open-source utility library by Reworkd, aimed at enhancing web
  interaction for AI agents.


  ## Features


  - Visually tags interactable elements

  - Supports actions based on text or screenshots

  - GPT-4(V) compatibility

  - OCR utilities

  - Web interaction enhancement


  ## Pricing


  Free and open-source.
