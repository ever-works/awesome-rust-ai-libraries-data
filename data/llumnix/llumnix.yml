markdown: >-
  ## Overview


  Llumnix is a multi-instance LLM serving system that focuses on improving
  serving efficiency through dynamic request migration and intelligent load
  balancing across instances.


  ## Features


  - Dynamic request migration across instances

  - Automatic load balancing

  - Efficient multi-instance coordination

  - Easy integration with existing serving frameworks

  - Improved tail latency and throughput


  ## Pricing


  Free and open-source.
