markdown: >-
  ## Overview


  LangChainBitcoin provides specialized tools for connecting LangChain agents to
  the Bitcoin ecosystem including the Lightning Network.


  ## Features


  - Bitcoin transaction capabilities

  - Lightning Network integration

  - L402-based authentication support

  - API traversal with automated Lightning payments

  - LangChain agent compatibility
