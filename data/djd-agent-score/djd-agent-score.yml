markdown: |-
  ## Overview

  DJD Agent Score provides on-chain reputation scoring for AI agent wallets.

  ## Features

  - 0-100 trust scores
  - 5 behavioral dimensions
  - Transaction pattern analysis
  - Multi-chain attestations
  - x402 micropayments
  - TypeScript SDK
  - ERC-8004 on-chain reputation publication
