markdown: >-
  ## Overview


  `drug` is a differentiable computation graph library for neural networks in
  Rust. It provides the core infrastructure needed to build computation graphs
  that support automatic differentiation, which is essential for training neural
  networks via backpropagation.


  ## Features


  - Differentiable computation graph implementation

  - Automatic differentiation support

  - Neural network building blocks

  - Efficient forward and backward passes
