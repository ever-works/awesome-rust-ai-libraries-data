markdown: >-
  ## Overview


  LMDeploy is a comprehensive toolkit developed by the OpenMMLab project for
  compressing, deploying, and serving large language models. It provides
  efficient inference with optimizations for production use.


  ## Features


  - Model compression and quantization support

  - High-throughput serving with dynamic batching

  - Support for offline batch processing and online serving modes

  - Efficient inference with custom CUDA kernels

  - Integration with OpenMMLab ecosystem

  - Multi-GPU model serving support


  ## Pricing


  Free and open-source under the Apache 2.0 license.
