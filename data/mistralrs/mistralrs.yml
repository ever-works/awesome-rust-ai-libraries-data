name: mistral.rs
description: mistral.rs is a fast, flexible LLM inference engine written in Rust
  with Python bindings, supporting multiple model architectures including Llama,
  Mistral, Phi, and Qwen, along with GGUF/GGML format support for high-speed
  inference on both CPU and GPU. It features quantization, multi-GPU, and
  streaming token generation, making it suitable for local LLM serving, AI
  assistant backends, and embedded AI applications. The project is faster than
  text-generation-inference for many models and offers easier deployment than
  vLLM.
