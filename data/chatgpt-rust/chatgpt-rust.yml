markdown: >-
  ## Overview


  ChatGPT Rust is a specialized wrapper for the ChatGPT API, designed to manage
  the full lifecycle of conversations. It handles message history, context
  management, and function calling support.


  ## Features


  - Conversation state management

  - Automatic message history tracking

  - Function calling support

  - Simplified chat completion API


  ## Status


  Active development.
