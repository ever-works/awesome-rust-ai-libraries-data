markdown: >-
  ## Overview


  AgentScope is an open-source framework designed to simplify the development of
  LLM-empowered multi-agent applications.


  ## Features


  - Simplified API for multi-agent application development

  - LLM integration support

  - Agent orchestration and coordination

  - Easy deployment workflows

  - Backed by ModelScope community


  ## Pricing


  Free and open-source.
