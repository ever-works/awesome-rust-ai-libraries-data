name: LLM (graniet)
description: Rust library providing a unified API and builder pattern for using
  multiple LLM backends (OpenAI, Anthropic, Ollama, DeepSeek, xAI, Google,
  Cohere, Mistral, Hugging Face, Groq, ElevenLabs) in a single project. Supports
  chat, completions, function calling, vision, reasoning, structured output,
  speech-to-text, text-to-speech, memory management, and reactive agentic
  systems.
