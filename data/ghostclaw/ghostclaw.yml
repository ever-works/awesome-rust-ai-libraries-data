markdown: >-
  ## Overview


  GhostClaw is a local AI agent accessible via Telegram that runs entirely on
  your computer without containers or cloud dependencies.


  ## Features


  - Runs locally with no cloud dependencies

  - Telegram-based interface for natural interaction

  - Quick 10-minute setup

  - No containers required

  - Privacy-focused design

  - Acts as a co-worker-style assistant
