markdown: >-
  ## Overview


  llmclient is a unified Rust client that supports multiple LLM providers
  including Gemini, OpenAI, Anthropic, and others. It abstracts
  provider-specific details into a common interface.


  ## Features


  - Support for Gemini, OpenAI, Anthropic, and other providers

  - Common interface across all supported providers

  - Simplified multi-provider integration


  ## Status


  Active development.
