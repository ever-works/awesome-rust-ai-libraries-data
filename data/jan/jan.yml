markdown: >-
  ## Overview


  Jan is an open-source alternative to ChatGPT that runs entirely offline across
  various hardware platforms.


  ## Features


  - Fully offline operation

  - Cross-platform support (PCs to multi-GPU clusters)

  - Universal architecture compatibility

  - Open-source and community-driven

  - Privacy-first design

  - Development stage


  ## Supported Hardware


  - Personal computers

  - Multi-GPU clusters

  - Various universal architectures
