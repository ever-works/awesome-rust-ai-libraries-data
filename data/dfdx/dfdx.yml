name: dfdx
description: dfdx is a shape-safe deep learning library in Rust that provides
  compile-time shape checking using Rust's type system and const generics — like
  PyTorch but with compile-time guarantees and no runtime shape errors. It
  supports automatic differentiation and both CPU and CUDA backends for
  GPU-accelerated computation. The library is designed for neural network
  research, tensor operations, and deep learning experiments.
