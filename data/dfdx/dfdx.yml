name: dfdx
description: "Dfdx (Deep Learning Framework in Rust) is a differentiable
  programming framework focused on composable and efficient neural network
  training with support for dynamic graphs, custom ops, and multiple devices
  (CPU, CUDA). Key features: zero-cost abstractions, forward/reverse mode AD,
  optimizers like Adam/SGD, serialization. Use cases: research prototypes,
  GPU-accelerated training, replacing PyTorch for Rust-native perf; compares to
  Candle for simplicity but excels in dynamic computation graphs unlike
  static-graph frameworks."
