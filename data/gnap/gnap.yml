markdown: >-
  ## Overview


  GNAP (Git-Native Agent Protocol) is an open RFC for coordinating AI agent
  teams entirely through a git repository.


  ## Features


  - Zero servers, zero databases required

  - Only 4 JSON files define the entire coordination protocol

  - Language/runtime agnostic

  - Immutable git history provides audit trail

  - Decentralized agent coordination

  - Version control integration


  ## Pricing


  Free and open-source.
