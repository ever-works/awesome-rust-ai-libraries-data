markdown: >-
  ## Overview


  Hugging Face's Transformers Agents provide three main types of agents for AI
  task execution.


  ## Agent Types


  - **HfAgent**: Inference with open-source models

  - **LocalAgent**: Using local models and tokenizers

  - **OpenAiAgent**: Access to OpenAI's closed models


  ## Capabilities


  - Code generation

  - AI task execution

  - Varying levels of customization

  - Local or remote execution options
