markdown: >-
  ## Overview


  Agentic Security is an open-source LLM vulnerability scanner and AI red
  teaming toolkit designed to identify security weaknesses in LLM-based
  applications.


  ## Features


  - Automated LLM vulnerability scanning

  - AI red teaming capabilities

  - Prompt injection detection

  - Security assessment automation

  - Comprehensive vulnerability reports


  ## Pricing


  Free and open-source.
