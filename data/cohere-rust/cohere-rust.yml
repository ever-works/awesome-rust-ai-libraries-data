markdown: >-
  ## Overview


  Cohere-Rust is an SDK for interacting with Cohere's NLP API from Rust. It
  enables text generation, embedding creation, and text classification using
  Cohere's large language models.


  ## Features


  - Text generation via Cohere API

  - Text embeddings for semantic search and retrieval

  - Text classification with Cohere's models

  - Idiomatic Rust API design


  ## Status


  Active development.
