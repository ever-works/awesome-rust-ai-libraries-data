name: Plasmate
description: A browser engine built for AI agents that compiles HTML into a
  Semantic Object Model (SOM), providing 10x token compression vs raw HTML.
  Features V8 JS rendering, CDP compatibility, authenticated browsing, and MCP
  server integration.
