markdown: >-
  ## Overview


  Llama Agentic System provides the agentic components of the Llama Stack APIs
  for building Llama-based AI agents.


  ## Features


  - Part of the Llama Stack ecosystem

  - Tool use and function calling support

  - Memory management for agents

  - Multi-turn interaction handling

  - Integration with Llama models

  - Modular API components


  ## Pricing


  Free and open-source.
