markdown: >-
  ## Overview


  DeepAnalyze is an agentic LLM system designed for autonomous data science
  tasks without relying on predefined workflows, enabling adaptive and
  curriculum-based learning.


  ## Features


  - Agentic LLM without any predefined workflow

  - Autonomous orchestration and adaptive optimization

  - Curriculum-based agentic training in real-world environments

  - Supports data tasks: preparation, analysis, modeling, visualization, and
  reporting

  - Supports data research: deep research across unstructured, semi-structured,
  and structured data


  ## Technical Details


  - Language: Python

  - License: MIT

  - 3,901 GitHub stars


  ## Pricing


  Open-source under the MIT license.
