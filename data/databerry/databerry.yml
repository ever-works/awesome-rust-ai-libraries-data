  ## Overview


  Chaindesk (formerly Databerry) is a no-code platform for building custom LLM
  Agents.


  ## Features


  - No-code platform

  - Custom LLM Agent building

  - Quick semantic search setup

  - Personal data indexing

  - No technical knowledge required


  ## Pricing


  Free and open-source.
