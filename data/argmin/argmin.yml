name: argmin
description: "Argmin is a numerical optimization crate in Rust supporting
  gradient-based (Adam, LBFGS) and derivative-free methods for minimizing cost
  functions in ML. Key features: customizable solvers, observer patterns for
  logging, parallel execution. Use cases: hyperparameter tuning, model training
  optimization, replacing scipy.optimize in Rust; complements dfdx/burn for
  solver integration."
