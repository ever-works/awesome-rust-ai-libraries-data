markdown: |-
  ## Overview

  Utah offers a DataFrame structure optimized for analytical workloads.

  ## Features

  - Columnar storage
  - Filtering, grouping, joins
  - Missing value handling
  - Expression evaluation

  ## Use Cases

  - ETL pipelines
  - Feature stores for ML
  - Data wrangling

  Free and open-source.
