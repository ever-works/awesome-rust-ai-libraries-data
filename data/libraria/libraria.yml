markdown: >-
  ## Overview


  Libraria AI offers a platform to build and embed custom AI chatbots with rich
  interaction features for business use.


  ## Features


  - Custom AI chatbot creation

  - Natural language processing

  - Call-to-action support

  - Link carousels

  - Analytics and insights

  - Embeddable widget

  - Free and paid plans available


  ## Pricing


  - Free plan available

  - Paid plans for business features
