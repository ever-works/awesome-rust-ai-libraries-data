markdown: >-
  ## Overview


  OpenRecall is an open-source, privacy-focused digital memory tool that
  captures and indexes screenshots to enhance productivity.


  ## Features


  - Screenshot capture and indexing

  - Privacy-focused design

  - Cross-platform: Windows, macOS, Linux

  - AI agent compatibility for personal assistance

  - Productivity enhancement


  ## Pricing


  Free and open-source.
