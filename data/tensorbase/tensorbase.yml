markdown: >-
  ## Overview


  TensorBase is a library for high-performance, distributed computing designed
  from the ground up in Rust. It offers a powerful abstraction layer over a
  distributed system, enabling you to work with large datasets by leveraging the
  storage, compute, and communication layers in a unified way.


  TensorBase is comparable to widely used machine learning frameworks like
  Apache Spark and TensorFlow. It also provides APIs for common machine learning
  operations like logistic regression, support vector machines, and deep
  learning. With TensorBase, you can easily distribute computations across
  multiple machines while utilizing Rust's safety and performance benefits.


  ## Features


  - High-performance distributed computing

  - Unified abstraction for storage, compute, and communication

  - APIs for logistic regression, SVM, deep learning

  - Rust safety and performance
