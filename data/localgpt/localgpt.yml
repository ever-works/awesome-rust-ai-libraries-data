  ## Overview


  LocalGPT enables private, offline interactions with documents through local AI
  processing.


  ## Features


  - Comprehensive model support

  - Embedding capabilities

  - RAG application API

  - GUI options

  - Privacy-first local processing

  - Secure document interaction

  - No data sent to external servers
