markdown: >-
  ## Overview


  tysm is a high-level OpenAI client for Rust designed with ease-of-use in mind.
  It takes a batteries-included approach, offering built-in support for batching
  requests and embeddings.


  ## Features


  - Batteries-included OpenAI client

  - Request batching for efficiency

  - Embedding generation support

  - Focus on developer ergonomics


  ## Status


  Active development.
