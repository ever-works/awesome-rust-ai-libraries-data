name: ndarray
description: "Ndarray is the foundational N-dimensional array library for Rust
  scientific computing, supporting tensor ops, linear algebra, broadcasting,
  parallelism via rayon. Key features: zero-copy views, SIMD acceleration, BLAS
  integration. Use cases: numerical computing, ML tensor backends, data
  processing; base for many Rust ML libs like tch-rs, linfa."
