markdown: >-
  ## Overview


  Outlines is a robust text generation library designed for agentic AI
  developers, enabling creation of predictable and structured AI agent outputs.


  ## Features


  - Multiple model integrations

  - Advanced prompting with Jinja templates

  - Efficient structured generation via regex

  - JSON schema-constrained generation

  - Context-free grammar support

  - Predictable and structured output generation


  ## Pricing


  Free and open-source.
