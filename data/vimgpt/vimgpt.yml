markdown: >-
  ## Overview


  vimGPT integrates GPT-4V's vision capabilities with the Vimium extension to
  enable web browsing and interaction through keyboard navigation and voice
  commands.


  ## Features


  - GPT-4V vision integration

  - Vimium extension compatibility

  - Keyboard navigation

  - Voice command support

  - Accessibility improvements

  - Innovative interaction methods


  ## Pricing


  Free and open-source.
