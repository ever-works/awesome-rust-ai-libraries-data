name: NumKong
description: SIMD-accelerated library for vector distances and similarity
  functions, optimized for x86 AVX2/AVX-512 and Arm NEON. Ideal for
  high-performance nearest neighbor search and embedding similarity in AI
  applications.
source_url: https://github.com/ashvardanian/NumKong
category: Machine Learning
