name: rust-bert
description: "Rust-bert offers safe Rust bindings to Hugging Face Transformers
  models for BERT, DistilBERT, etc., enabling tokenization, embeddings,
  inference without Python. Key features: ONNX/TensorFlow backends via
  tch-rs/tract, pre-trained models. Use cases: NLP tasks like classification,
  NER in Rust; compares to candle for LLM focus but specialized for
  BERT-family."
source_url: https://github.com/guillaume-be/rust-bert
