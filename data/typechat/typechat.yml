markdown: >-
  ## Overview


  TypeChat is a library that facilitates building natural language interfaces by
  using schema engineering as an alternative to traditional function calling in
  LLMs.


  ## Features


  - Schema engineering approach

  - Alternative to function calling

  - Avoids JSON schema constraints

  - Natural language interface building

  - Type-safe integration


  ## Pricing


  Free and open-source.
