markdown: >-
  ## Overview


  AIFS offers a simple and efficient local semantic search capability for
  folders.


  ## Features


  - Local semantic search for folders

  - Unstructured.IO integration for data processing

  - ChromaDB for similarity-based searching

  - Fast embedding retrieval

  - Efficient search performance


  ## Pricing


  Free and open-source.
