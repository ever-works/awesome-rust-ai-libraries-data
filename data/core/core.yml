markdown: >-
  ## Overview


  Core is an automated prompt engineering platform that systematizes the process
  of creating, testing, and optimizing prompts for large language models.


  ## Features


  - Automated prompt generation and refinement

  - Prompt versioning and tracking

  - A/B testing for prompts

  - Performance metrics and analytics

  - Integration with major LLM providers


  ## Pricing


  Free and open-source.
