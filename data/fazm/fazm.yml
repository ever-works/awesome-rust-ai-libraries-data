  ## Overview

  Fazm is an open-source, voice-controlled AI computer agent for macOS.

  ## Features

  - Voice-controlled interaction
  - Controls entire desktop through natural language
  - Any app, file, or workflow support
  - Built in Swift/SwiftUI
  - Local-first architecture
  - MIT licensed

  ## Platform

  macOS only.
