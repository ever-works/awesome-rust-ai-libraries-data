  ## Overview


  PrivateGPT is a secure, offline-capable AI tool for querying documents with
  Large Language Models, designed for privacy-conscious use.


  ## Features


  - Offline operation

  - Document querying with LLMs

  - High-level and low-level APIs

  - Privacy-first design

  - Context-aware application development

  - No data leaks


  ## Pricing


  Free and open-source.
