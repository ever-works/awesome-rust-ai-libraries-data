markdown: >-
  ## Overview


  LLM.swift is a lightweight Swift library that provides a simple and readable
  way to interact with large language models locally on Apple platforms.


  ## Features


  - Swift-native API for LLM interactions

  - Supports macOS, iOS, and watchOS

  - Local model execution

  - Simple and readable interface

  - Seamless Apple platform integration


  ## Pricing


  Free and open-source.
