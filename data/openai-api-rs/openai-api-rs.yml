markdown: >-
  ## Overview


  openai-api-rs is a community-maintained alternative Rust client for the OpenAI
  API. It provides similar features to other OpenAI SDKs, giving developers
  flexibility in how they integrate OpenAI services into their Rust
  applications.


  ## Features


  - Compatible with OpenAI API endpoints

  - Community-maintained with regular updates

  - Supports completions, chat, and other OpenAI services


  ## Status


  Active development.
