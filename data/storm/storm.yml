markdown: >-
  ## Overview


  Storm is an LLM-powered knowledge curation system that automates research
  workflows to produce full-length, citation-backed reports.


  ## Features


  - Automated topic research

  - Full-length report generation

  - Citation-backed content

  - LLM-powered knowledge synthesis

  - Structured document output


  ## Use Cases


  - Academic research assistance

  - Topic exploration and summarization

  - Knowledge base creation

  - Automated literature review
