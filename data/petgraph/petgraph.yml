markdown: |-
  ## Overview

  petgraph provides graph data structures and algorithms for Rust.

  ## Features

  - Supports directed and undirected graphs
  - Various graph algorithms like Dijkstra, Bellman-Ford, etc.
  - Persistent data structure support
  - Apache-2 license
